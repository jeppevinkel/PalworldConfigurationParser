name: Update README settings table

on:
  pull_request:
    branches:
      - main
    paths:
      - "PalworldConfigurationParser/Program.cs"
      - ".github/workflows/scripts/generate_readme_settings.py"
      - ".github/workflows/build-and-release.yaml"

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Generate settings table
        run: python .github/workflows/scripts/generate_readme_settings.py

      - name: Commit & push (if README changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Only commit when there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "docs: auto-update environment variable settings table [skip ci]"
            git push
          fi