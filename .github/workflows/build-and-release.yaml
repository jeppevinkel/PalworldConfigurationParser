name: Build new release

on:
  push:
  pull_request:
  release:
    types:
      - created

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"   # Strip leading 'v' if present (v1.2.3 → 1.2.3)
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            VERSION="0.0.0-dev.${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build

      - name: Check format
        run: dotnet format --verify-no-changes
  
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [setup, validate]

    strategy:
      matrix:
        include:
          - target: linux-x64
            artifact-name: PalworldConfigurationParser
          - target: win-x64
            artifact-name: PalworldConfigurationParser.exe

    steps:
      - uses: actions/checkout@v7

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install dependencies
        run: dotnet restore

      - name: Build
        run: |
          dotnet publish \
            --no-restore \
            --configuration Release \
            --runtime ${{ matrix.target }} \
            --self-contained \
            -p:PublishSingleFile=true \
            -p:DebugType=embedded \
            -p:DebugSymbols=false \
            -p:PublishTrimmed=true \
            -p:Version=${{ needs.setup.outputs.version }} \
            --output ./publish/${{ matrix.target }} \
            PalworldConfigurationParser/PalworldConfigurationParser.csproj

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ./publish/${{ matrix.target }}/${{ matrix.artifact-name }}*

  Publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build

    if: needs.build.result == 'success' && github.event_name == 'release'

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./publish

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ./publish/**/*
